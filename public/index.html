<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduFitScore</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="top-bar">
        <div class="site-credit">created by avs-rgb</div>
        <div class="top-bar-actions">
          <button id="back-home-button" type="button" class="back-home-button is-hidden">חזרה לעמוד הבית</button>
          <button id="share-site-whatsapp" type="button" class="share-site-button">שיתוף האתר ב-WhatsApp</button>
        </div>
      </div>
      <section class="hero">
        <h1>מחשבון ציונים בחינוך גופני לפי שכבה</h1>
        <p class="subtitle">בחרו כיתה והשתמשו בטבלאות המקור כדי להמיר תוצאות לציונים, הכניסו תוצאות מספריות בלבד ללא תוים נוספים.</p>
      </section>

      <section id="home-view" class="home-view">
        <div class="home-card panel">
          <div class="home-actions">
            <button id="guest-entry-button" type="button" class="home-action-button">אורחים</button>
            <button id="member-entry-button" type="button" class="home-action-button secondary-button">חברים</button>
          </div>
        </div>
      </section>

      <section id="app-shell" class="app-shell is-hidden">
      <section class="top-controls">
        <section class="tabs-panel">
          <section class="tabs" aria-label="מצבי שימוש">
            <button id="male-student-tab-button" class="tab-button is-active" type="button">תלמידים</button>
            <button id="female-student-tab-button" class="tab-button" type="button">תלמידות</button>
            <button id="teacher-tab-button" class="tab-button" type="button">מורים</button>
          </section>
        </section>

        <section id="teacher-top-controls" class="teacher-top-controls teacher-only-controls is-hidden">
          <section class="panel teacher-gender-panel">
            <label class="field-label">קבוצת תלמידים</label>
            <div class="teacher-gender-tabs" aria-label="קבוצת תלמידים">
              <button id="teacher-male-tab-button" type="button" class="teacher-gender-tab is-active">תלמידים</button>
              <button id="teacher-female-tab-button" type="button" class="teacher-gender-tab">תלמידות</button>
            </div>
          </section>

          <section class="panel teacher-student-count-panel">
            <label id="teacher-student-count-label" class="field-label" for="student-count">מספר תלמידים</label>
            <select id="student-count"></select>
          </section>
        </section>

        <section class="panel class-selector-panel">
          <label class="field-label" for="sheet-select">בחירת כיתה</label>
          <div id="class-tabs" class="class-tabs" aria-label="בחירת כיתה"></div>
          <select id="sheet-select" class="class-select visually-hidden"></select>
        </section>
      </section>

      <section id="student-view" class="view-panel">
        <section class="layout">
          <form id="score-form" class="panel form-panel"></form>
          <section class="panel results-panel">
            <div class="teacher-panel-header">
              <h2>תוצאות</h2>
              <button id="student-share-whatsapp" type="button" class="teacher-panel-button whatsapp-button">שליחה ל-WhatsApp</button>
            </div>
            <div id="average-score" class="average-score">עדיין לא חושב ציון</div>
            <div id="results-list" class="results-list"></div>
          </section>
        </section>

        <section class="panel table-panel">
          <h2>הטבלה הראשית</h2>
          <div id="table-container" class="table-container"></div>
        </section>
      </section>

      <section id="teacher-view" class="view-panel is-hidden">
        <section class="teacher-layout">
          <section class="panel teacher-entry-panel">
            <div class="teacher-panel-header">
              <h2>הזנת תוצאות</h2>
              <button id="teacher-calculate" type="button" class="teacher-panel-button">המרת ציונים לכל הכיתה</button>
            </div>
            <div id="teacher-entry-table" class="table-container"></div>
          </section>

          <section class="panel teacher-results-panel">
            <div class="teacher-panel-header">
              <h2>טבלת תוצאות מומרות</h2>
              <div class="teacher-results-actions">
                <button id="share-whatsapp" type="button" class="teacher-panel-button whatsapp-button">שליחה ל-WhatsApp</button>
                <button id="download-csv" type="button" class="secondary-button teacher-panel-button">הורדת CSV</button>
              </div>
            </div>
            <div id="teacher-results-table" class="table-container"></div>
          </section>
        </section>
      </section>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
  </html>
